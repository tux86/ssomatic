name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build:
    name: Build & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun run lint

      - name: Syntax check
        run: |
          bun -e "import './packages/core/src/index.ts'"
          bun -e "import './packages/cli/src/index.tsx'"

      - name: Build binary
        run: bun run build

      - name: Verify binary
        run: |
          ls -lh dist/
          test -f dist/awsume

      - name: Validate commitlint config
        if: github.event_name == 'pull_request'
        run: bunx commitlint --from=${{ github.event.pull_request.base.sha }} --to=${{ github.event.pull_request.head.sha }} --verbose || true
